<p>enquiry-management </p>
<section  class="bg-light py-5">
<table class="table table-bordered table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Requirement</th>
            <th>Status</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let e of enquiries">
            <td>{{e.id}}</td>
            <td>{{e.name}}</td>
            <td>{{e.email}}</td>
            <td>{{e.phone}}</td>
            <td>{{e.requirement}}</td>
             <td>{{e.status}}</td>
            <td>{{e.createdAt}}</td>
        </tr>
        <tr *ngIf="enquiries.length===0">
            <td colspan="6" class="text-center">No Enquiries Found</td>
        </tr>
    </tbody>
</table>
</section>
