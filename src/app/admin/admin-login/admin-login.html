<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow p-4" style="width: 360px">

    <h4 class="text-center mb-3">Admin Login</h4>

    <form (ngSubmit)="login()">

      <div class="mb-3">
        <label>Email</label>
        <input type="email"
               class="form-control"
               [(ngModel)]="email"
               name="email"
               required>
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input type="password"
               class="form-control"
               [(ngModel)]="password"
               name="password"
               required>
      </div>

      <button class="btn btn-primary w-100">
        Login
      </button>

    </form>

  </div>
</div>
