<div class="card">
  <h2>Installation Form</h2>

  <form [formGroup]="installationForm" (ngSubmit)="saveInstallation()">

    <label>Order ID</label>
    <input type="number" formControlName="order.id" />

    <label>Installation Date</label>
    <input type="date" formControlName="installationDate" />

    <label>Technician Name</label>
    <input type="text" formControlName="technicianName" />

    <label>Location</label>
    <input type="text" formControlName="location" />

    <label>Status</label>
    <select formControlName="status">
      <option value="PENDING">Pending</option>
      <option value="COMPLETED">Completed</option>
    </select>

    <label>Remarks</label>
    <textarea formControlName="remarks"></textarea>

    <button type="submit">Save Installation</button>

  </form>
</div>
