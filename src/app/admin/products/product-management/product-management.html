<p>Product List For Admin</p>
<section  class="bg-light py-5">
<button class="btn btn-primary mb-3" (click)="openAddModal()">
  Add Product
</button>    
<div>
    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <td>ID</td>
                 <td>name</td>
                  <td>price</td>
                   <td>description</td>
                    <td>capacityLph</td>
                     <td>filtrationType</td>
                     <td>solarSupported</td>
                     <td>status</td>
                     <td>Edit</td>
                     <td>Delete</td>
                   </tr>
        </thead>
        <tbody>
            <tr *ngFor="let p of products">
               <td>{{p.id}}</td>
               <td>{{p.name}}</td>
               <td>{{p.price}}</td>
               <td>{{p.description}}</td>
               <td>{{p.capacityLph}}</td>
               <td>{{p.filtrationType}}</td>
               <td>{{p.solarSupported}}</td>
               <td>{{p.status}}</td>
               <!-- <td><button onclick="addProduct()">Add</button></td> -->
                     <td><button class="btn btn-danger btn-sm">Delete</button></td>
                     <td><button class="btn btn-warning btn-sm" (click)="openEditModal(p)">Edit</button></td>
            </tr>
        </tbody>
    </table>
</div>



<!-- ADD PRODUCT MODAL -->
<div class="modal fade show d-block" *ngIf="showModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add New Product</h5>
        <button class="btn-close" (click)="closeModal()"></button>
      </div>

      <div class="modal-body">
        <form (ngSubmit)="submitProduct()" #form="ngForm">

          <input class="form-control mb-2"
            placeholder="Name"
            [(ngModel)]="product.name"
            name="name"
            required>

          <input type="number" class="form-control mb-2"
            placeholder="Price"
            [(ngModel)]="product.price"
            name="price"
            required>

          <textarea class="form-control mb-2"
            placeholder="Description"
            [(ngModel)]="product.description"
            name="description"></textarea>

          <input type="number" class="form-control mb-2"
            placeholder="Capacity LPH"
            [(ngModel)]="product.capacityLph"
            name="capacityLph">

          <input class="form-control mb-2"
            placeholder="Filtration Type"
            [(ngModel)]="product.filtrationType"
            name="filtrationType">

          <select class="form-control mb-2"
            [(ngModel)]="product.solarSupported"
            name="solarSupported">
            <option [value]="true">Yes</option>
            <option [value]="false">No</option>
          </select>

          <select class="form-control mb-3"
            [(ngModel)]="product.status"
            name="status">
            <option>ACTIVE</option>
            <option>INACTIVE</option>
          </select>

          <button class="btn btn-success w-100" type="submit">
            Save Product
          </button>

        </form>
      </div>

    </div>
  </div>
</div>

<!-- EDIT PRODUCT MODAL -->
<div class="modal fade show d-block" *ngIf="showEditModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Edit Product</h5>
        <button class="btn-close" (click)="closEditeModal()"></button>
      </div>

      <div class="modal-body">
        <form (ngSubmit)="submitEditProduct()" #form="ngForm">

          <input class="form-control mb-2"
            placeholder="Name"
            [(ngModel)]="selectedProduct.name"
            name="name"
            required>

          <input type="number" class="form-control mb-2"
            placeholder="Price"
            [(ngModel)]="selectedProduct.price"
            name="price"
            required>

          <textarea class="form-control mb-2"
            placeholder="Description"
            [(ngModel)]="selectedProduct.description"
            name="description"></textarea>

          <input type="number" class="form-control mb-2"
            placeholder="Capacity LPH"
            [(ngModel)]="selectedProduct.capacityLph"
            name="capacityLph">

          <input class="form-control mb-2"
            placeholder="Filtration Type"
            [(ngModel)]="selectedProduct.filtrationType"
            name="filtrationType">

          <select class="form-control mb-2"
            [(ngModel)]="selectedProduct.solarSupported"
            name="solarSupported">
            <option [value]="true">Yes</option>
            <option [value]="false">No</option>
          </select>

          <select class="form-control mb-3"
            [(ngModel)]="selectedProduct.status"
            name="status">
            <option>ACTIVE</option>
            <option>INACTIVE</option>
          </select>

          <button class="btn btn-success w-100" type="submit">
            Save Product
          </button>

        </form>
      </div>

    </div>
  </div>
</div>
</section>
