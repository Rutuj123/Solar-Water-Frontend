
<section id="contact" class="bg-dark text-white py-5">
  <div class="container">
    <h2 class="text-center mb-4">Contact Us</h2>
    <h2>Request a Free Consultation</h2>
<p>
  Tell us about your requirement and location.
  Our team will contact you with the best solution.
</p>

    <div class="row justify-content-center">
      <div class="col-md-6">
        
        <form (ngSubmit)="submitLead()">
  <input class="form-control mb-3" type="text" placeholder="Name" [(ngModel)]="lead.name" name="name" required>
  <input class="form-control mb-3" type="text" placeholder="Phone" [(ngModel)]="lead.phone" name="phone" required>
  <input class="form-control mb-3" type="email" placeholder="Email" [(ngModel)]="lead.email" name="email">
  <input class="form-control mb-3" type="text" placeholder="Location" [(ngModel)]="lead.location" name="location">
  <textarea  class="form-control mb-3" placeholder="Requirement" [(ngModel)]="lead.requirement" name="requirement"></textarea>
  <button class="btn btn-warning w-100" type="submit">Contact Us</button>
</form>
      </div>
       <div class="col-md-6">
      <h5>Shivam Solar Water Solutions</h5>
      <p>
        📍 Maharashtra, India <br>
        📞 +91 9876543210
      </p>

      <a class="btn btn-success w-100"
         href="https://wa.me/919876543210"
         target="_blank">
        Chat on WhatsApp
      </a>
    </div>
    </div>
  </div>
</section>
